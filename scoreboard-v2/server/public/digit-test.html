<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Digit Test</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.9rem; }
    select { width: 100%; padding: 10px; font-size: 1.1rem; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; margin-bottom: 16px; }
    button { width: 100%; padding: 14px; font-size: 1.05rem; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
    #btn-delay { background: #2866b2; color: #fff; }
    #btn-walk { background: #8a6d1f; color: #fff; }
    #btn-send { background: #2a7; color: #fff; }
    #btn-scan { background: #8a3f1f; color: #fff; }
    #btn-clear { background: #555; color: #fff; }
    #status { margin-top: 16px; padding: 12px; border-radius: 6px; background: #222; font-size: 0.95rem; min-height: 44px; }
    #status.ok { background: #1a3d2a; color: #6f6; }
    #status.err { background: #3d1a1a; color: #f66; }
    .serial-input { display: flex; gap: 8px; margin-bottom: 10px; }
    .serial-input input { flex: 1; padding: 10px; font-size: 1rem; font-family: monospace; background: #000; color: #0f0; border: 1px solid #444; border-radius: 6px; }
    .serial-input button { padding: 10px 18px; font-size: 1rem; background: #2a7; color: #fff; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    #serial-log { background: #000; color: #0f0; font-family: monospace; font-size: 0.85rem; padding: 10px; border-radius: 6px; height: 180px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; border: 1px solid #333; }
    .log-sent { color: #6cf; }
    .log-recv { color: #0f0; }
    .log-sys { color: #888; }
    .digit-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 20px; }
    .digit-btn { padding: 14px 0; font-size: 1rem; background: #333; color: #ccc; border: 2px solid transparent; border-radius: 6px; cursor: pointer; width: 100%; }
    .digit-btn.active { border-color: #2a7; color: #fff; background: #1a3d2a; }
    .digit-label { text-align: center; font-size: 0.7rem; color: #666; margin-top: 2px; }
    .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>Single Digit Test</h1>
  <p class="sub">Use this page only with <code>single_digit_test.ino</code> uploaded. Start by setting a slow pulse delay, then run Walk.</p>

  <div class="panel">
    <label for="delay">Pulse delay (ms):</label>
    <select id="delay">
      <option value="5">5ms</option>
      <option value="10" selected>10ms (default)</option>
      <option value="20">20ms</option>
      <option value="50">50ms</option>
      <option value="100">100ms</option>
    </select>
    <button id="btn-delay">Set Pulse Delay</button>
    <button id="btn-walk">Walk 8 Across Digits</button>
  </div>

  <div class="panel">
    <label>Digit position (tap to select):</label>
    <div class="digit-grid" id="digit-grid"></div>

    <label for="glyph">Value to display:</label>
    <select id="glyph">
      <option value="-">- (blank)</option>
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
    </select>

    <button id="btn-send">Send to Display</button>
    <button id="btn-scan">Scan Selected Digit 0-9</button>
    <button id="btn-clear">Clear All Digits</button>
  </div>

  <div class="panel">
    <label>Serial Console:</label>
    <div class="serial-input">
      <input type="text" id="serial-cmd" placeholder="e.g. walk, digit,3,8, delay,50" autocomplete="off" spellcheck="false">
      <button id="btn-serial">Send</button>
    </div>
    <div id="serial-log"></div>
  </div>

  <div id="status">Ready - set pulse delay, then run Walk.</div>

  <script>
    let selectedDigit = null;
    const status = document.getElementById('status');

    function setStatus(msg, isErr) {
      status.textContent = msg;
      status.className = isErr ? 'err' : 'ok';
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      return res.json();
    }

    const grid = document.getElementById('digit-grid');
    for (let i = 0; i < 6; i++) {
      const wrap = document.createElement('div');
      const btn = document.createElement('button');
      btn.className = 'digit-btn';
      btn.textContent = i;
      btn.dataset.index = i;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.digit-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        selectedDigit = i;
      });
      const lbl = document.createElement('div');
      lbl.className = 'digit-label';
      lbl.textContent = `pos ${i}`;
      wrap.appendChild(btn);
      wrap.appendChild(lbl);
      grid.appendChild(wrap);
    }

    document.getElementById('btn-delay').addEventListener('click', async () => {
      const ms = Number(document.getElementById('delay').value);
      try {
        const data = await postJson('/api/digit/delay', { ms });
        setStatus(data.ok ? `${data.command} sent. Wait for the board to react.` : `Error: ${data.error}`, !data.ok);
      } catch (e) {
        setStatus(`Connection error: ${e.message}`, true);
      }
    });

    document.getElementById('btn-walk').addEventListener('click', async () => {
      try {
        const data = await postJson('/api/digit/walk');
        setStatus(data.ok ? 'walk# sent. Watch each digit in turn.' : `Error: ${data.error}`, !data.ok);
      } catch (e) {
        setStatus(`Connection error: ${e.message}`, true);
      }
    });

    document.getElementById('btn-send').addEventListener('click', async () => {
      if (selectedDigit === null) {
        setStatus('Select a digit position first (0-5)', true);
        return;
      }
      const glyph = document.getElementById('glyph').value;
      try {
        const data = await postJson('/api/digit', { index: selectedDigit, glyph });
        setStatus(data.ok ? `${data.command} sent. Check the board.` : `Error: ${data.error}`, !data.ok);
      } catch (e) {
        setStatus(`Connection error: ${e.message}`, true);
      }
    });

    document.getElementById('btn-scan').addEventListener('click', async () => {
      if (selectedDigit === null) {
        setStatus('Select a digit position first (0-5)', true);
        return;
      }
      try {
        const data = await postJson('/api/digit/scan', { index: selectedDigit });
        setStatus(data.ok ? `${data.command} sent. The selected digit should count 0 to 9.` : `Error: ${data.error}`, !data.ok);
      } catch (e) {
        setStatus(`Connection error: ${e.message}`, true);
      }
    });

    document.getElementById('btn-clear').addEventListener('click', async () => {
      try {
        const data = await postJson('/api/clear');
        setStatus(data.ok ? 'clear# sent. All digits should go blank.' : `Error: ${data.error}`, !data.ok);
      } catch (e) {
        setStatus(`Connection error: ${e.message}`, true);
      }
    });

    // --- Serial console ---
    const serialLog = document.getElementById('serial-log');
    const serialCmd = document.getElementById('serial-cmd');

    function logLine(text, cls) {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = text + '\n';
      serialLog.appendChild(span);
      serialLog.scrollTop = serialLog.scrollHeight;
      // Keep max 200 lines
      while (serialLog.childElementCount > 200) serialLog.removeChild(serialLog.firstChild);
    }

    async function sendSerial() {
      const cmd = serialCmd.value.trim();
      if (!cmd) return;
      logLine('> ' + cmd, 'log-sent');
      serialCmd.value = '';
      try {
        const data = await postJson('/api/serial', { command: cmd });
        if (data.ok) {
          setStatus(`Sent: ${data.command}`, false);
        } else {
          logLine('ERR: ' + data.error, 'log-sys');
          setStatus(data.error, true);
        }
      } catch (e) {
        logLine('ERR: ' + e.message, 'log-sys');
        setStatus(`Connection error: ${e.message}`, true);
      }
    }

    document.getElementById('btn-serial').addEventListener('click', sendSerial);
    serialCmd.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendSerial();
    });

    // SSE stream for Arduino responses
    const evtSource = new EventSource('/api/serial/stream');
    evtSource.onmessage = (e) => {
      if (e.data === 'connected') {
        logLine('--- serial stream connected ---', 'log-sys');
      } else {
        logLine(e.data, 'log-recv');
      }
    };
    evtSource.onerror = () => {
      logLine('--- serial stream disconnected, reconnecting... ---', 'log-sys');
    };
  </script>
</body>
</html>
