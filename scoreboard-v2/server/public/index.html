<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Droylsden Cricket Club Scoreboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">
    <img src="img/crest.png" alt="Droylsden CC Crest" class="club-crest">
    <h1>Droylsden Cricket Club</h1>
    <div class="subtitle">Scoreboard</div>
  </div>

  <div class="token-input">
    <label for="token">Token:</label>
    <input type="password" id="token" placeholder="Enter scorer token">
    <span id="token-status" class="token-status">–</span>
  </div>

  <!-- 3×3 scoreboard grid
       Bat A    |   Total   |   Bat B
       Target   |           |   Wickets
       DLS      |           |   Overs
  -->
  <div class="score-grid">
    <div class="field" id="field-batsmanA">
      <div class="field-label">Bat A</div>
      <div class="digits"></div>
    </div>

    <div class="field" id="field-total">
      <div class="field-label">Total</div>
      <div class="digits"></div>
    </div>

    <div class="field" id="field-batsmanB">
      <div class="field-label">Bat B</div>
      <div class="digits"></div>
    </div>

    <div class="field" id="field-target">
      <div class="field-label">Target</div>
      <div class="digits"></div>
    </div>

    <div class="field-empty"></div>

    <div class="field" id="field-wickets">
      <div class="field-label">Wickets</div>
      <div class="digits"></div>
    </div>

    <div class="field" id="field-dls">
      <div class="field-label">DLS Score</div>
      <div class="digits"></div>
    </div>

    <div class="field-empty"></div>

    <div class="field" id="field-overs">
      <div class="field-label">Overs</div>
      <div class="digits"></div>
    </div>
  </div>

  <div class="innings-controls">
    <button id="btn-new-innings" class="btn-new-innings">New Innings</button>
  </div>

  <div id="status" class="status-bar">Ready</div>

  <div class="connection">
    <span id="connection-dot" class="connection-dot"></span>
    <span id="connection-label">Checking...</span>
  </div>

  <div class="nav">
    <a href="/admin">Admin Panel</a>
    &nbsp;·&nbsp;
    <a href="/digit-test">Diagnostics</a>
  </div>

  <div class="footer">
    Droylsden Cricket Club &mdash; <a href="https://droylsdencc.co.uk" target="_blank">droylsdencc.co.uk</a>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
