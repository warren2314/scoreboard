<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Admin - Droylsden Cricket Club Scoreboard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .match-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 6px 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .match-card:hover, .match-card.selected {
      background: rgba(100,160,100,0.2);
      border-color: #4caf50;
    }
    .match-card .match-teams { font-weight: 700; font-size: 1rem; }
    .match-card .match-meta  { font-size: 0.78rem; color: #999; margin-top: 2px; }
    .token-hint {
      font-size: 0.8rem;
      color: #7a9f7a;
      margin: 4px 0 8px;
    }
    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin: 14px 0 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="img/crest.png" alt="Droylsden CC Crest" class="club-crest">
    <h1>Scoreboard Admin</h1>
    <div class="subtitle">Droylsden Cricket Club</div>
  </div>

  <div class="token-input">
    <label for="token">Admin Token:</label>
    <input type="password" id="token" placeholder="Enter token">
    <span id="token-status" class="token-status">Enter token</span>
  </div>

  <div class="admin-actions">
    <button class="admin-btn" id="btn-test">Test Mode</button>
    <button class="admin-btn danger" id="btn-reboot">Reboot Pi</button>
    <button class="admin-btn danger" id="btn-shutdown">Shutdown Pi</button>
  </div>

  <div id="status" class="status-bar">Ready</div>

  <!-- ── Play Cricket Sync ── -->
  <div class="pc-section">
    <div class="pc-heading">Play Cricket Live Sync</div>

    <!-- API token (one-time admin setup) -->
    <div class="section-label">API Token (one-time setup)</div>
    <div id="token-hint" class="token-hint" style="display:none"></div>
    <div class="token-input">
      <label for="pc-api-token">Token:</label>
      <input type="password" id="pc-api-token" placeholder="Leave blank to use saved token">
    </div>
    <div class="admin-actions" style="margin-top:4px">
      <button class="admin-btn" id="btn-save-token">Save Token</button>
      <button class="admin-btn danger" id="btn-clear-token" style="display:none">Clear</button>
    </div>

    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:14px 0">

    <!-- Match picker -->
    <div class="section-label">Today's Matches</div>
    <div class="admin-actions" style="margin-top:0">
      <button class="admin-btn" id="btn-pc-find">Find Today's Matches</button>
    </div>
    <div id="match-list" style="margin-top:8px"></div>

    <!-- Start / Stop -->
    <div class="token-input" style="margin-top:10px">
      <label for="pc-dry-run" style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="pc-dry-run">
        Dry Run (log only &mdash; do NOT update scoreboard)
      </label>
    </div>
    <div class="admin-actions" style="margin-top:0">
      <button class="admin-btn" id="btn-pc-start" disabled>Start Sync</button>
      <button class="admin-btn" id="btn-pc-stop">Stop Sync</button>
    </div>
    <div id="pc-status" class="status-bar" style="white-space:pre-line">Not syncing</div>
  </div>

  <!-- ── Spectator Display ── -->
  <div class="pc-section" style="margin-top:12px">
    <div class="pc-heading">Spectator Display</div>
    <div class="admin-actions" style="margin-top:8px">
      <a href="/spectator" target="_blank" class="admin-btn" style="text-decoration:none;display:inline-block;text-align:center">Open TV Display</a>
    </div>
    <div id="spectator-status" class="status-bar" style="white-space:pre-line">Not yet loaded</div>
  </div>

  <div class="connection">
    <span id="connection-dot" class="connection-dot"></span>
    <span id="connection-label">Checking...</span>
  </div>

  <div class="nav">
    <a href="/">Back to Scorer</a>
  </div>

  <div class="footer">
    Droylsden Cricket Club &mdash; <a href="https://droylsdencc.co.uk" target="_blank">droylsdencc.co.uk</a>
  </div>

  <script>
    const statusBar   = document.getElementById('status');
    const tokenInput  = document.getElementById('token');
    const tokenStatus = document.getElementById('token-status');

    // Restore admin token from localStorage
    const savedAdminToken = localStorage.getItem('authToken');
    if (savedAdminToken) tokenInput.value = savedAdminToken;

    function getToken() { return tokenInput.value; }

    function getAuthHeaders() {
      const token = getToken();
      if (!token) { showStatus('Enter the admin token first', true); return null; }
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    // Live admin token verification
    let tokenCheckTimer = null;
    async function verifyToken() {
      const token = getToken();
      if (!token) { tokenStatus.textContent = 'Enter token'; tokenStatus.className = 'token-status'; return; }
      tokenStatus.textContent = 'Checking...';
      tokenStatus.className = 'token-status checking';
      try {
        const res  = await fetch('/api/auth/check', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (data.valid) {
          tokenStatus.textContent = 'Active';
          tokenStatus.className = 'token-status ok';
          localStorage.setItem('authToken', token);
          loadPcConfig(); // load PC config once admin is verified
        } else {
          tokenStatus.textContent = 'Invalid';
          tokenStatus.className = 'token-status error';
        }
      } catch {
        tokenStatus.textContent = 'Offline';
        tokenStatus.className = 'token-status error';
      }
    }
    tokenInput.addEventListener('input', () => { clearTimeout(tokenCheckTimer); tokenCheckTimer = setTimeout(verifyToken, 400); });
    verifyToken();

    function showStatus(msg, isError) {
      statusBar.textContent = msg;
      statusBar.className = isError ? 'status-bar error' : 'status-bar ok';
    }

    async function apiPost(url, needsAuth) {
      const headers = { 'Content-Type': 'application/json' };
      if (needsAuth) {
        const token = getToken();
        if (!token) { showStatus('Enter the admin token first', true); return; }
        headers['Authorization'] = `Bearer ${token}`;
      }
      try {
        const res  = await fetch(url, { method: 'POST', headers });
        const data = await res.json();
        showStatus(data.message || data.error, !data.ok);
      } catch (err) {
        showStatus(`Connection error: ${err.message}`, true);
      }
    }

    document.getElementById('btn-test').addEventListener('click', () => apiPost('/api/test', false));
    document.getElementById('btn-reboot').addEventListener('click',   () => { if (confirm('Reboot the Pi?')) apiPost('/api/reboot', true); });
    document.getElementById('btn-shutdown').addEventListener('click', () => { if (confirm('Shut down the Pi? You will need physical access to turn it back on.')) apiPost('/api/shutdown', true); });

    // ── Play Cricket config (token persistence) ──────────────────────────────

    const pcStatusBar = document.getElementById('pc-status');
    function showPcStatus(msg, isError) {
      pcStatusBar.textContent = msg;
      pcStatusBar.className = isError ? 'status-bar error' : 'status-bar ok';
    }

    async function loadPcConfig() {
      const headers = getAuthHeaders();
      if (!headers) return;
      try {
        const res  = await fetch('/api/playcricket/config', { headers });
        const data = await res.json();
        const hint    = document.getElementById('token-hint');
        const clearBtn = document.getElementById('btn-clear-token');
        if (data.hasSavedToken) {
          hint.textContent = `Saved token: ${data.tokenHint}`;
          hint.style.display = 'block';
          clearBtn.style.display = '';
          document.getElementById('pc-api-token').placeholder = 'Leave blank to use saved token';
        } else {
          hint.style.display = 'none';
          clearBtn.style.display = 'none';
          document.getElementById('pc-api-token').placeholder = 'Play Cricket API token';
        }
      } catch {}
    }

    document.getElementById('btn-save-token').addEventListener('click', async () => {
      const apiToken = document.getElementById('pc-api-token').value.trim();
      if (!apiToken) { showPcStatus('Enter a token to save', true); return; }
      const headers = getAuthHeaders();
      if (!headers) return;
      try {
        const res  = await fetch('/api/playcricket/config', { method: 'POST', headers, body: JSON.stringify({ apiToken }) });
        const data = await res.json();
        showPcStatus(data.message || data.error, !data.ok);
        if (data.ok) { document.getElementById('pc-api-token').value = ''; loadPcConfig(); }
      } catch (err) { showPcStatus(`Error: ${err.message}`, true); }
    });

    document.getElementById('btn-clear-token').addEventListener('click', async () => {
      if (!confirm('Clear the saved API token?')) return;
      const headers = getAuthHeaders();
      if (!headers) return;
      try {
        const res  = await fetch('/api/playcricket/config', { method: 'DELETE', headers });
        const data = await res.json();
        showPcStatus(data.message || data.error, !data.ok);
        if (data.ok) loadPcConfig();
      } catch (err) { showPcStatus(`Error: ${err.message}`, true); }
    });

    // ── Match picker ──────────────────────────────────────────────────────────

    let selectedMatchId = null;

    document.getElementById('btn-pc-find').addEventListener('click', async () => {
      const headers = getAuthHeaders();
      if (!headers) return;
      const matchList = document.getElementById('match-list');
      matchList.innerHTML = '<div style="color:#aaa;font-size:0.9rem">Searching Play Cricket...</div>';
      showPcStatus('', false);
      try {
        const res  = await fetch('/api/playcricket/find-match', { headers });
        const data = await res.json();
        if (data.ok && data.matches.length > 0) {
          matchList.innerHTML = data.matches.map(m => `
            <div class="match-card" data-id="${m.id}">
              <div class="match-teams">${m.home} vs ${m.away}</div>
              <div class="match-meta">${m.competition || ''}${m.ground ? ' · ' + m.ground : ''}</div>
            </div>`).join('');
          matchList.querySelectorAll('.match-card').forEach(card => {
            card.addEventListener('click', () => {
              matchList.querySelectorAll('.match-card').forEach(c => c.classList.remove('selected'));
              card.classList.add('selected');
              selectedMatchId = card.dataset.id;
              document.getElementById('btn-pc-start').disabled = false;
              showPcStatus(`Selected: ${card.querySelector('.match-teams').textContent} — press Start Sync`, false);
            });
          });
        } else {
          matchList.innerHTML = '';
          showPcStatus(data.message || data.error || 'No matches found for today', !data.ok);
        }
      } catch (err) {
        matchList.innerHTML = '';
        showPcStatus(`Connection error: ${err.message}`, true);
      }
    });

    document.getElementById('btn-pc-start').addEventListener('click', async () => {
      if (!selectedMatchId) { showPcStatus('Pick a match first', true); return; }
      const dryRun  = document.getElementById('pc-dry-run').checked;
      const headers = getAuthHeaders();
      if (!headers) return;
      try {
        const res  = await fetch('/api/playcricket/start', {
          method: 'POST', headers,
          body: JSON.stringify({ matchId: selectedMatchId, dryRun })
        });
        const data = await res.json();
        showPcStatus(data.message || data.error, !data.ok);
      } catch (err) { showPcStatus(`Connection error: ${err.message}`, true); }
    });

    document.getElementById('btn-pc-stop').addEventListener('click', async () => {
      const headers = getAuthHeaders();
      if (!headers) return;
      try {
        const res  = await fetch('/api/playcricket/stop', { method: 'POST', headers });
        const data = await res.json();
        showPcStatus(data.message || data.error, !data.ok);
      } catch (err) { showPcStatus(`Connection error: ${err.message}`, true); }
    });

    // ── Spectator state ───────────────────────────────────────────────────────

    async function pollSpectator() {
      try {
        const res  = await fetch('/api/spectator');
        const d    = await res.json();
        const el   = document.getElementById('spectator-status');
        const rate = d.currentRate != null ? d.currentRate.toFixed(2) : '—';
        const lines = [
          `${d.battingTeam || '—'} batting vs ${d.bowlingTeam || '—'}`,
          `Score: ${(d.total||'').replace(/-/g,'_')}/${d.wickets||'0'}  Overs: ${(d.overs||'').replace(/-/g,'_')}  RR: ${rate}`,
          d.batA && d.batA.name ? `  ${d.batA.name}: ${(d.batA.runs||'').replace(/-/g,'_')} (${d.batA.balls||0}b)` : '',
          d.batB && d.batB.name ? `  ${d.batB.name}: ${(d.batB.runs||'').replace(/-/g,'_')} (${d.batB.balls||0}b)` : '',
          d.bowler && d.bowler.name ? `Bowling: ${d.bowler.name}  ${d.bowler.wickets}-${d.bowler.runs} (${d.bowler.overs} ov)` : '',
          d.lastApiUpdate ? `Last API: ${new Date(d.lastApiUpdate).toLocaleTimeString()}` : 'API not yet synced'
        ].filter(Boolean).join('\n');
        el.textContent = lines;
        el.className   = 'status-bar ok';
      } catch {}
    }
    pollSpectator();
    setInterval(pollSpectator, 5000);

    // ── Connection status ─────────────────────────────────────────────────────

    async function pollStatus() {
      try {
        const res  = await fetch('/api/status');
        const data = await res.json();
        const dot   = document.getElementById('connection-dot');
        const label = document.getElementById('connection-label');
        dot.classList.toggle('connected', data.serialConnected);
        label.textContent = data.serialConnected ? 'Arduino connected' : 'Arduino disconnected';
        if (data.playCricket && data.playCricket.syncing) {
          const pc   = data.playCricket;
          const t    = pc.lastSync ? new Date(pc.lastSync).toLocaleTimeString() : 'pending...';
          const err  = pc.lastError ? `\nERROR: ${pc.lastError}` : '';
          const mode = pc.dryRun ? ' [DRY RUN]' : '';
          let scoreStr = '';
          if (pc.lastScore) {
            const s = pc.lastScore;
            const f = v => v.replace(/-/g, '_');
            scoreStr = `\n${f(s.total)}/${f(s.wickets)}  Overs: ${f(s.overs)}  BatA: ${f(s.batsmanA)}  BatB: ${f(s.batsmanB)}`;
          }
          showPcStatus(`Syncing match ${pc.matchId}${mode}\nLast update: ${t}${err}${scoreStr}`, !!pc.lastError);
          document.getElementById('pc-dry-run').checked = pc.dryRun;
          document.getElementById('btn-pc-start').disabled = false;
          selectedMatchId = pc.matchId;
        }
      } catch {}
    }
    pollStatus();
    setInterval(pollStatus, 5000);
  </script>
</body>
</html>
