<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Admin - Droylsden Cricket Club Scoreboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">
    <img src="img/crest.png" alt="Droylsden CC Crest" class="club-crest">
    <h1>Scoreboard Admin</h1>
    <div class="subtitle">Droylsden Cricket Club</div>
  </div>

  <div class="token-input">
    <label for="token">Admin Token:</label>
    <input type="password" id="token" placeholder="Enter token">
    <span id="token-status" class="token-status">Enter token</span>
  </div>

  <div class="admin-actions">
    <button class="admin-btn" id="btn-test">Test Mode</button>
    <button class="admin-btn danger" id="btn-reboot">Reboot Pi</button>
    <button class="admin-btn danger" id="btn-shutdown">Shutdown Pi</button>
  </div>

  <div id="status" class="status-bar">Ready</div>

  <div class="pc-section">
    <div class="pc-heading">Play Cricket Live Sync</div>
    <div class="token-input">
      <label for="pc-match-id">Match ID:</label>
      <input type="text" id="pc-match-id" placeholder="e.g. 4789123" inputmode="numeric">
    </div>
    <div class="token-input">
      <label for="pc-api-token">API Token:</label>
      <input type="password" id="pc-api-token" placeholder="Your Play Cricket API token">
    </div>
    <div class="token-input" style="margin-top:8px">
      <label for="pc-dry-run" style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="pc-dry-run">
        Dry Run (fetch &amp; log only &mdash; do NOT update scoreboard)
      </label>
    </div>
    <div class="admin-actions" style="margin-top:0">
      <button class="admin-btn" id="btn-pc-usb">Load from USB</button>
      <button class="admin-btn" id="btn-pc-start">Start Sync</button>
      <button class="admin-btn" id="btn-pc-stop">Stop Sync</button>
    </div>
    <div id="pc-status" class="status-bar">Not syncing</div>
  </div>

  <div class="connection">
    <span id="connection-dot" class="connection-dot"></span>
    <span id="connection-label">Checking...</span>
  </div>

  <div class="nav">
    <a href="/">Back to Scorer</a>
  </div>

  <div class="footer">
    Droylsden Cricket Club &mdash; <a href="https://droylsdencc.co.uk" target="_blank">droylsdencc.co.uk</a>
  </div>

  <script>
    const statusBar = document.getElementById('status');
    const tokenInput = document.getElementById('token');
    const tokenStatus = document.getElementById('token-status');

    // Restore saved token on page load
    const savedAdminToken = localStorage.getItem('authToken');
    if (savedAdminToken) tokenInput.value = savedAdminToken;

    function getToken() {
      return tokenInput.value;
    }

    // Live token verification — runs on input (debounced) and on load
    let tokenCheckTimer = null;
    async function verifyToken() {
      const token = getToken();
      if (!token) {
        tokenStatus.textContent = 'Enter token';
        tokenStatus.className = 'token-status';
        return;
      }
      tokenStatus.textContent = 'Checking...';
      tokenStatus.className = 'token-status checking';
      try {
        const res = await fetch('/api/auth/check', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.valid) {
          tokenStatus.textContent = 'Active';
          tokenStatus.className = 'token-status ok';
          localStorage.setItem('authToken', token);
        } else {
          tokenStatus.textContent = 'Invalid';
          tokenStatus.className = 'token-status error';
        }
      } catch {
        tokenStatus.textContent = 'Offline';
        tokenStatus.className = 'token-status error';
      }
    }
    tokenInput.addEventListener('input', () => {
      clearTimeout(tokenCheckTimer);
      tokenCheckTimer = setTimeout(verifyToken, 400);
    });
    verifyToken();

    function showStatus(msg, isError) {
      statusBar.textContent = msg;
      statusBar.className = isError ? 'status-bar error' : 'status-bar ok';
    }

    async function apiPost(url, needsAuth) {
      const headers = { 'Content-Type': 'application/json' };
      if (needsAuth) {
        const token = getToken();
        if (!token) {
          showStatus('Enter the admin token first', true);
          return;
        }
        headers['Authorization'] = `Bearer ${token}`;
      }
      try {
        const res = await fetch(url, { method: 'POST', headers });
        const data = await res.json();
        showStatus(data.message || data.error, !data.ok);
      } catch (err) {
        showStatus(`Connection error: ${err.message}`, true);
      }
    }

    document.getElementById('btn-test').addEventListener('click', () => apiPost('/api/test', false));
    document.getElementById('btn-reboot').addEventListener('click', () => {
      if (confirm('Reboot the Pi?')) apiPost('/api/reboot', true);
    });
    document.getElementById('btn-shutdown').addEventListener('click', () => {
      if (confirm('Shut down the Pi? You will need physical access to turn it back on.')) apiPost('/api/shutdown', true);
    });

    // --- Play Cricket sync ---
    const pcStatusBar = document.getElementById('pc-status');

    function showPcStatus(msg, isError) {
      pcStatusBar.textContent = msg;
      pcStatusBar.className = isError ? 'status-bar error' : 'status-bar ok';
    }

    function getAuthHeaders() {
      const token = getToken();
      if (!token) {
        showStatus('Enter the admin token first', true);
        return null;
      }
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
    }

    document.getElementById('btn-pc-usb').addEventListener('click', async () => {
      showPcStatus('Looking for USB stick...', false);
      try {
        const res  = await fetch('/api/playcricket/usb-config');
        const data = await res.json();
        if (data.ok) {
          document.getElementById('pc-match-id').value  = data.matchId;
          document.getElementById('pc-api-token').value = data.apiToken;
          showPcStatus(`Loaded from USB — Match ID: ${data.matchId}. Press Start Sync when ready.`, false);
        } else {
          showPcStatus(data.error, true);
        }
      } catch (err) {
        showPcStatus(`Connection error: ${err.message}`, true);
      }
    });

    document.getElementById('btn-pc-start').addEventListener('click', async () => {
      const matchId  = document.getElementById('pc-match-id').value.trim();
      const apiToken = document.getElementById('pc-api-token').value.trim();
      const dryRun   = document.getElementById('pc-dry-run').checked;
      if (!matchId || !apiToken) {
        showPcStatus('Enter a Match ID and API Token', true);
        return;
      }
      const headers = getAuthHeaders();
      if (!headers) return;
      try {
        const res  = await fetch('/api/playcricket/start', {
          method: 'POST',
          headers,
          body: JSON.stringify({ matchId, apiToken, dryRun })
        });
        const data = await res.json();
        showPcStatus(data.message || data.error, !data.ok);
      } catch (err) {
        showPcStatus(`Connection error: ${err.message}`, true);
      }
    });

    document.getElementById('btn-pc-stop').addEventListener('click', async () => {
      const headers = getAuthHeaders();
      if (!headers) return;
      try {
        const res  = await fetch('/api/playcricket/stop', { method: 'POST', headers });
        const data = await res.json();
        showPcStatus(data.message || data.error, !data.ok);
      } catch (err) {
        showPcStatus(`Connection error: ${err.message}`, true);
      }
    });

    // Poll connection status
    async function pollStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const dot = document.getElementById('connection-dot');
        const label = document.getElementById('connection-label');
        dot.classList.toggle('connected', data.serialConnected);
        label.textContent = data.serialConnected ? 'Arduino connected' : 'Arduino disconnected';

        // Reflect Play Cricket sync state
        if (data.playCricket) {
          const pc = data.playCricket;
          if (pc.syncing) {
            const t    = pc.lastSync ? new Date(pc.lastSync).toLocaleTimeString() : 'pending...';
            const err  = pc.lastError ? `\nERROR: ${pc.lastError}` : '';
            const mode = pc.dryRun ? ' [DRY RUN - scoreboard not updated]' : '';
            let scoreStr = '';
            if (pc.lastScore) {
              const s = pc.lastScore;
              const fmt = v => v.replace(/-/g, '_');
              scoreStr = `\nBat A: ${fmt(s.batsmanA)}  |  Total: ${fmt(s.total)}  |  Bat B: ${fmt(s.batsmanB)}` +
                         `\nWickets: ${fmt(s.wickets)}  |  Overs: ${fmt(s.overs)}  |  Target: ${fmt(s.target)}  |  DLS: ${fmt(s.dls || '---')}`;
            }
            showPcStatus(`Syncing match ${pc.matchId}${mode}\nLast update: ${t}${err}${scoreStr}`, !!pc.lastError);
            document.getElementById('pc-dry-run').checked = pc.dryRun;
          }
        }
      } catch {}
    }
    pollStatus();
    setInterval(pollStatus, 5000);
  </script>
</body>
</html>
